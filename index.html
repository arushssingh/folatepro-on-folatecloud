<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>folate | AI Landing Page Generator</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563EB' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='4' y='3' width='16' height='7' rx='2' /%3E%3Crect x='4' y='14' width='16' height='7' rx='2' /%3E%3Cpath d='M8 10v4' /%3E%3Cpath d='M16 10v4' /%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              gray: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#3f3f46',
                800: '#27272a',
                900: '#18181b',
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-color: #f8faff;
      }
      .dark {
        --bg-color: #050810;
      }
      body {
        background-color: var(--bg-color);
        color: #18181b;
        -webkit-font-smoothing: antialiased;
        margin: 0;
        overflow: hidden;
      }
      .dark body {
        color: #fafafa;
      }
      .bg-mesh {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-color: #f8faff;
        background-image:
          radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.45) 0%, transparent 55%),
          radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.38) 0%, transparent 55%),
          radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.28) 0%, transparent 45%);
        background-size: 100% 100%, 100% 100%, 100% 100%;
      }
      .dark .bg-mesh {
        background-color: #050810;
        overflow: hidden;
      }
      .dark .bg-mesh::before,
      .dark .bg-mesh::after,
      .dark .bg-mesh .orb3 {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }
      .dark .bg-mesh::before {
        content: '';
        position: absolute;
        width: 700px;
        height: 700px;
        top: -15%;
        left: -10%;
        background: radial-gradient(circle, rgba(5, 151, 255, 0.32) 0%, rgba(5, 151, 255, 0.08) 50%, transparent 70%);
        border-radius: 50%;
        filter: blur(60px);
        animation: floatOrb1 18s ease-in-out infinite;
      }
      .dark .bg-mesh::after {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        top: -10%;
        right: -8%;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.28) 0%, rgba(99, 102, 241, 0.06) 50%, transparent 70%);
        border-radius: 50%;
        filter: blur(70px);
        animation: floatOrb2 22s ease-in-out infinite;
      }
      .bg-orb3 {
        position: fixed;
        width: 500px;
        height: 500px;
        bottom: -15%;
        left: 50%;
        transform: translateX(-50%);
        background: radial-gradient(circle, rgba(6, 182, 212, 0.18) 0%, rgba(6, 182, 212, 0.04) 50%, transparent 70%);
        border-radius: 50%;
        filter: blur(80px);
        z-index: -1;
        pointer-events: none;
        display: none;
        animation: floatOrb3 26s ease-in-out infinite;
      }
      .dark .bg-orb3 {
        display: block;
      }
      @keyframes floatOrb1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%       { transform: translate(40px, 30px) scale(1.06); }
        66%       { transform: translate(-20px, 50px) scale(0.96); }
      }
      @keyframes floatOrb2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%       { transform: translate(-50px, 40px) scale(1.08); }
        66%       { transform: translate(30px, -30px) scale(0.94); }
      }
      @keyframes floatOrb3 {
        0%, 100% { transform: translateX(-50%) scale(1); }
        50%       { transform: translateX(calc(-50% + 40px)) scale(1.1); }
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d4d4d8;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a1a1aa;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #3f3f46;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }
      .fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>

</head>
  <body>
    <div class="bg-mesh"></div>
    <div class="bg-orb3"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
